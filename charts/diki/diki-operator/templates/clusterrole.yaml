apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: diki-operator
  labels:
{{ include "labels" . | indent 4 }}
rules:
- apiGroups:
  - "diki.gardener.cloud"
  resources:
  - compliancescans
  - compliancescans/status
  verbs:
  - get
  - list
  - watch
  - update
  - patch
  - delete
- apiGroups: 
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
